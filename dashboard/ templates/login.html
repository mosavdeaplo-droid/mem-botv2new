<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MEM Store | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e14;--surface:#111620;--gold:#c9a84c;--gold-dim:#6b5420;--text:#d4c9a8;--text-dim:#6b7080;--red:#e74c3c;--border:rgba(201,168,76,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:400px;padding:24px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;text-align:center;}
.logo{width:80px;border-radius:50%;margin-bottom:16px;border:2px solid var(--gold-dim);}
h1{font-family:'Cinzel',serif;font-size:16px;letter-spacing:4px;color:var(--gold);margin-bottom:4px;}
.sub{font-size:11px;letter-spacing:2px;color:var(--text-dim);margin-bottom:28px;}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;margin-bottom:16px;}
.form-input:focus{border-color:var(--gold-dim);}
.btn-login{width:100%;padding:12px;background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
.btn-login:hover{background:rgba(201,168,76,0.2);border-color:var(--gold);}
.error{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:var(--red);padding:10px;border-radius:8px;margin-bottom:16px;font-size:12px;letter-spacing:1px;}
.credits{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-align:center;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <img class="logo" src="https://cdn.discordapp.com/attachments/1504256416569884788/1505797502622896198/Geometric_Monogram_Logo_for_MEM.png?ex=6a0beeb4&is=6a0a9d34&hm=24492cc4843e4969bea21c79aff736ec0c1a36dc26778ffff54087fd2291a3e0&" alt="MEM">
    <h1>MEM STORE</h1>
    <div class="sub">DASHBOARD ACCESS</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <input class="form-input" type="password" name="password" placeholder="Enter Password" autofocus>
      <button class="btn-login" type="submit">ENTER</button>
    </form>
  </div>
  <div class="credits">Powered by MEM Development | Deaplo</div>
</div>
</body>
</html>
